name: Android AWS Device Farm Tests

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/android-devicefarm.yml'
      - 'binding/android/PorcupineTestApp/**'
      - 'resources/.test/**'
      - 'resources/audio_samples/**'
      - 'script/automation/devicefarm.py'
  pull_request:
    branches: [ master, 'v[0-9]+.[0-9]+' ]
    paths:
      - '.github/workflows/android-devicefarm.yml'
      - 'binding/android/PorcupineTestApp/**'
      - 'resources/.test/**'
      - 'resources/audio_samples/**'
      - 'script/automation/devicefarm.py'

defaults:
  run:
    working-directory: binding/android/PorcupineTestApp/

jobs:
  build:
    name: Run Android Tests on AWS Device Farm
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Installing Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run:
        pip3 install requests boto3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Copy test_resources
      run: ./copy_test_resources.sh

    - name: Inject AccessKey
      run: echo pvTestingAccessKey="${{secrets.PV_VALID_ACCESS_KEY}}" >> local.properties

    - name: Inject Device
      run: echo pvTestingDevice="best" >> local.properties

    - name: Inject Android keystore variables
      run: |
        echo storePassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyPassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyAlias=picovoice >> local.properties
        echo storeFile=../picovoice.jks >> local.properties

    - name: Setup Android keystore file
      run: echo "${{secrets.ANDROID_RELEASE_KEYSTORE_FILE_B64}}" | base64 -d > picovoice.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build app
      run: ./gradlew assembleEnDebug

    - name: Build androidTest
      run: ./gradlew assembleEnDebugAndroidTest

    - name: Run tests on AWS Device Farm
      run: python3 ../../../script/automation/devicefarm.py
        --type android
        --run_name porcupine-android-unit
        --app_path "porcupine-test-app/build/outputs/apk/en/debug/porcupine-test-app-en-debug.apk"
        --test_path "porcupine-test-app/build/outputs/apk/androidTest/en/debug/porcupine-test-app-en-debug-androidTest.apk"
        --aws_id "${{secrets.AWS_DEVICE_FARM_ACCESS_KEY_ID}}"
        --aws_secret "${{secrets.AWS_DEVICE_FARM_ACCESS_KEY_SECRET}}"
        --project_arn "${{secrets.AWS_DEVICE_FARM_PROJECT_ARN}}"
        --test_spec_arn "${{secrets.AWS_DEVICE_FARM_ANDROID_TEST_SPEC_ARN}}"
        --device_pool_arn "${{secrets.AWS_DEVICE_FARM_ANDROID_DEVICE_POOL_ARN}}"

  build-integ:
    name: Run Android Integration Tests on AWS Device Farm
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Installing Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run:
        pip3 install requests boto3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Copy test_resources
      run: ./copy_test_resources.sh

    - name: Inject AccessKey
      run: echo pvTestingAccessKey="${{secrets.PV_VALID_ACCESS_KEY}}" >> local.properties

    - name: Inject Device
      run: echo pvTestingDevice="best" >> local.properties

    - name: Inject Android keystore variables
      run: |
        echo storePassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyPassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyAlias=picovoice >> local.properties
        echo storeFile=../picovoice.jks >> local.properties

    - name: Setup Android keystore file
      run: echo "${{secrets.ANDROID_RELEASE_KEYSTORE_FILE_B64}}" | base64 -d > picovoice.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build app
      run: ./gradlew assembleEnRelease

    - name: Build androidTest
      run: ./gradlew assembleEnReleaseAndroidTest -DtestBuildType=integ

    - name: Run tests on AWS Device Farm
      run: python3 ../../../script/automation/devicefarm.py
        --type android
        --run_name porcupine-android-integ
        --app_path "porcupine-test-app/build/outputs/apk/en/release/porcupine-test-app-en-release.apk"
        --test_path "porcupine-test-app/build/outputs/apk/androidTest/en/release/porcupine-test-app-en-release-androidTest.apk"
        --aws_id "${{secrets.AWS_DEVICE_FARM_ACCESS_KEY_ID}}"
        --aws_secret "${{secrets.AWS_DEVICE_FARM_ACCESS_KEY_SECRET}}"
        --project_arn "${{secrets.AWS_DEVICE_FARM_PROJECT_ARN}}"
        --test_spec_arn "${{secrets.AWS_DEVICE_FARM_ANDROID_TEST_SPEC_ARN}}"
        --device_pool_arn "${{secrets.AWS_DEVICE_FARM_ANDROID_DEVICE_POOL_ARN}}"
